<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Budapest Build — Training Plan 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script>
      // Apply persisted theme before first paint to avoid a flash
      try {
        var t = JSON.parse(localStorage.getItem('bb:theme'));
        var dark = t ? t === 'dark' : window.matchMedia('(prefers-color-scheme: light)').matches === false;
        document.documentElement.classList.toggle('dark', dark);
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
